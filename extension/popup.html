<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      color: #1e293b;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }
    p {
      color: #64748b;
      font-size: 13px;
      margin-top: 0;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s;
    }
    button:hover {
      background: #047857;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14.14 14.14-3.53 3.53a2 2 0 0 1-2.82 0l-4.25-4.25a2 2 0 0 1 0-2.82l9.19-9.19a2 2 0 0 1 2.83 0l4.24 4.24a2 2 0 0 1 0 2.83Z"/><path d="m2 2 20 20"/></svg>
    <h2>Geography Pro Collector</h2>
  </div>
  <p>Bôi đen đoạn văn bản, sau đó nhấn nút bên dưới để chuyển đổi học liệu thành câu hỏi trắc nghiệm Địa lý bằng AI.</p>
  <button id="collectBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m3 12 18-18"/><path d="m3 12 18 18"/></svg>
    Gửi văn bản vào kho đề
  </button>
  <p id="errorMsg" style="color: #ef4444; margin-top: 8px; text-align: center; display: none;">Vui lòng bôi đen văn bản trước!</p>
  
  <script src="popup.js"></script>
</body>
</html>
